services:
  postgres:
    image: postgres:17
    container_name: maintenance_postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-maintenance_db}
      POSTGRES_USER: ${DB_USER:-maintenance_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-maintenance_pass}
      TZ: UTC
    ports:
      - "${DB_PORT:-5433}:5432"
    volumes:
      - maintenance_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-maintenance_user} -d ${DB_NAME:-maintenance_db}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  maintenance_postgres_data:
